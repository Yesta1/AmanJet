<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AmanJet | Smart Safety Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --aj-navy: #0F172A;
      --aj-green: #10B981;
      --aj-white: #FFFFFF;
      --aj-gray-bg: #F8FAFC;
      --aj-border: #E2E8F0;
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
    body, html { height: 100%; width: 100%; overflow: hidden; background: var(--aj-gray-bg); }

    #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
    .leaflet-control-attribution { display: none !important; }

    .ui-layer { position: absolute; inset: 0; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; }
    .ui-layer > * { pointer-events: auto; }

    /* Top bar */
    .top-nav {
      padding: calc(16px + var(--safe-area-top)) 16px 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .status-pill {
      background: rgba(255,255,255,.92); backdrop-filter: blur(10px);
      padding: 6px 14px; border-radius: 100px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,.08); border: 1px solid white;
      font-size: 13px; font-weight: 600; color: var(--aj-navy);
    }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--aj-green); flex-shrink: 0; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,.2); } 50% { box-shadow: 0 0 0 6px rgba(16,185,129,.08); } }

    .back-btn {
      background: var(--aj-navy); color: white; padding: 10px 16px; border-radius: 100px;
      font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px;
      border: none; cursor: pointer; text-decoration: none;
    }
    .back-btn:hover { background: #1e2c3a; }

    /* Category bar */
    .category-bar {
      padding: 12px 16px; display: flex; gap: 8px; overflow-x: auto;
      scrollbar-width: none; -ms-overflow-style: none; pointer-events: auto;
    }
    .category-bar::-webkit-scrollbar { display: none; }
    .cat-item {
      background: white; padding: 9px 16px; border-radius: 12px;
      white-space: nowrap; font-size: 13px; font-weight: 600; color: var(--aj-navy);
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); border: 1.5px solid var(--aj-border);
      transition: all .2s;
    }
    .cat-item:hover { border-color: var(--aj-green); }
    .cat-item.active { background: var(--aj-navy); color: white; border-color: var(--aj-navy); }

    /* Spacer pushes bottom sheet down */
    .flex-spacer { flex: 1; pointer-events: none; }

    /* SOS button */
    .sos-btn {
      position: absolute; right: 16px; bottom: 240px;
      width: 65px; height: 65px; background: #EF4444; color: white;
      border-radius: 50%; border: 4px solid white; font-weight: 900; font-size: 13px;
      box-shadow: 0 8px 20px rgba(239,68,68,.4); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 1001; transition: transform .15s;
    }
    .sos-btn:hover { transform: scale(1.05); }

    /* Bottom sheet */
    .bottom-sheet {
      background: white; border-top-left-radius: 28px; border-top-right-radius: 28px;
      padding: 20px 22px calc(20px + var(--safe-area-bottom));
      box-shadow: 0 -10px 30px rgba(0,0,0,.08);
    }
    .sheet-handle { width: 40px; height: 4px; background: var(--aj-border); border-radius: 2px; margin: -8px auto 16px; }
    .sheet-title { font-size: 16px; font-weight: 800; color: var(--aj-navy); margin-bottom: 14px; }
    #place-info { min-height: 60px; }
    .place-placeholder { font-size: 14px; color: #94A3B8; }

    .route-btn {
      width: 100%; margin-top: 14px; padding: 14px;
      background: var(--aj-navy); color: white; border: none; border-radius: 14px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s;
    }
    .route-btn:hover { background: #1e2c3a; }

    /* Marker styles */
    .poi-marker {
      background: white; border: 2px solid var(--aj-navy); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; color: var(--aj-navy);
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .poi-marker.safe { border-color: var(--aj-green); color: var(--aj-green); }

    .loader {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: var(--aj-navy); color: white; padding: 8px 18px; border-radius: 20px;
      font-size: 12px; font-weight: 600; z-index: 2000; display: none;
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="loader" class="loader">Ищем объекты...</div>

<div class="ui-layer">

  <!-- Top nav -->
  <div class="top-nav">
    <div class="status-pill">
      <div class="live-dot"></div>
      Live Tracking Active
    </div>
    <a href="index.html" class="back-btn">← На главную</a>
  </div>

  <!-- Categories -->
  <div class="category-bar">
    <div class="cat-item active" onclick="searchPlaces('pharmacy', this)">💊 Аптеки</div>
    <div class="cat-item" onclick="searchPlaces('hospital', this)">🏥 Больницы</div>
    <div class="cat-item" onclick="searchPlaces('police', this)">🚔 Полиция</div>
    <div class="cat-item" onclick="searchPlaces('cafe', this)">☕ Кафе</div>
    <div class="cat-item" onclick="searchPlaces('supermarket', this)">🛒 Магазины</div>
  </div>

  <div class="flex-spacer"></div>

  <!-- Bottom sheet -->
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🗺️ Smart Safety Map</div>
    <div id="place-info">
      <div class="place-placeholder">Нажмите на маркер чтобы увидеть информацию о месте</div>
    </div>
    <button class="route-btn" onclick="findSafestRoute()">🛡️ Построить безопасный маршрут</button>
  </div>
</div>

<!-- SOS -->
<button class="sos-btn" onclick="alert('🚨 SOS сигнал активирован!')">SOS</button>

<script>
  let map, userMarker, poiGroup;
  const DEF_LAT = 42.3417, DEF_LNG = 69.5901;

  function init() {
    map = L.map('map', { zoomControl: true }).setView([DEF_LAT, DEF_LNG], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    poiGroup = L.layerGroup().addTo(map);

    // User marker
    const userIcon = L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;border-radius:50%;background:#3B82F6;border:3px solid white;box-shadow:0 2px 10px rgba(59,130,246,.5);"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8]
    });
    userMarker = L.marker([DEF_LAT, DEF_LNG], { icon: userIcon }).addTo(map)
      .bindPopup('📍 Вы здесь');

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const coords = [pos.coords.latitude, pos.coords.longitude];
        map.setView(coords, 15);
        userMarker.setLatLng(coords);
        searchPlaces('pharmacy');
      }, () => {
        searchPlaces('pharmacy');
      }, { enableHighAccuracy: true, timeout: 10000 });
    } else {
      searchPlaces('pharmacy');
    }

    lucide.createIcons();
  }

  async function searchPlaces(query, element) {
    if (element) {
      document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
    }
    const loader = document.getElementById('loader');
    loader.style.display = 'block';
    const center = map.getCenter();
    const url = `https://photon.komoot.io/api/?q=${query}&lat=${center.lat}&lon=${center.lng}&limit=15`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      renderMarkers(data.features);
    } catch(e) {
      console.error('Search error:', e);
    } finally {
      loader.style.display = 'none';
    }
  }

  function renderMarkers(features) {
    poiGroup.clearLayers();
    features.forEach(f => {
      const [lng, lat] = f.geometry.coordinates;
      const p = f.properties;
      const isSafe = (p.osm_value === 'pharmacy' || p.osm_value === 'hospital');
      const icon = L.divIcon({
        className: `poi-marker${isSafe ? ' safe' : ''}`,
        html: `<i data-lucide="${getIcon(p.osm_value)}" style="width:14px;height:14px;"></i>`,
        iconSize: [30, 30]
      });
      const marker = L.marker([lat, lng], { icon }).addTo(poiGroup);
      marker.on('click', () => {
        document.getElementById('place-info').innerHTML = `
          <div style="font-size:11px;font-weight:800;color:${isSafe ? '#10B981' : '#0F172A'};text-transform:uppercase;margin-bottom:4px;">
            ${isSafe ? '✅ Проверенная точка AmanJet' : '📍 Заведение'}
          </div>
          <div style="font-size:18px;font-weight:800;color:#0F172A;margin-bottom:4px;">${p.name || 'Без названия'}</div>
          <div style="font-size:13px;color:#64748B;">${p.city || ''} ${p.street || ''}</div>
        `;
        lucide.createIcons();
      });
    });
    lucide.createIcons();
  }

  function getIcon(val) {
    if (val === 'pharmacy') return 'pill';
    if (val === 'hospital') return 'plus-square';
    if (val === 'cafe' || val === 'restaurant') return 'coffee';
    if (val === 'supermarket') return 'shopping-basket';
    if (val === 'police') return 'shield';
    return 'map-pin';
  }

  function findSafestRoute() {
    alert('🛡️ Расчёт безопасного маршрута с учётом освещения и истории инцидентов...');
  }

  window.onload = init;
</script>
</body>
</html>
